<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/frontend/" />
  <title>Players Intelligence Database</title>
  <link rel="icon" type="image/png" href="../data/photos/branding/logo.png?v=20260506" />
  <link rel="apple-touch-icon" href="../data/photos/branding/logo.png?v=20260506" />
  <link rel="shortcut icon" type="image/png" href="../data/photos/branding/logo.png?v=20260506" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    :root {
      --bg: #0E1116;
      --surface: #1A1F26;
      --surface-2: #21262E;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.10);
      --text-1: #FFFFFF;
      --text-2: #B5BDCB;
      --text-3: #6B7585;
      --accent: #6FE0A8;
      --accent-bg: rgba(111,224,168,0.10);
      --hot: #FBBF24;
      --info: #60A5FA;
      --comp-seriea: #6FE0A8;  /* verde acceso, palette PID */
      --comp-acl: #60A5FA;
      --comp-cup: #A78BFA;
      --comp-serieb: #FB923C;  /* arancione, palette PID */
      --comp-ij1: #C084FC;     /* viola tenue, Primavera */
      --comp-it3: #38BDF8;     /* azzurro chiaro, Seconde Squadre (Serie C) */
      --comp-pl1: #EF4444;     /* rosso, Ekstraklasa */
      --comp-pl2: #60A5FA;     /* blu chiaro, 1 Liga */
      --comp-nat: #F472B6;
      --sidebar-w: 220px;
    }
    * { font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    html, body { background: var(--bg); color: var(--text-1); }
    body { min-height: 100vh; }
    .stat-cell { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .player-card { transition: transform 120ms ease, border-color 120ms ease; cursor: pointer; }
    .player-card:hover { transform: translateY(-2px); border-color: var(--border-strong); }
    .filter-select { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; color: var(--text-1); cursor: pointer; }
    .filter-select:focus { border-color: var(--accent); }
    .filter-select option { background: var(--surface); color: var(--text-1); }
    input[type=text] { color: var(--text-1); }
    input[type=text]::placeholder { color: var(--text-3); }
    @media (max-width: 1024px) { :root { --sidebar-w: 64px; } .sidebar-label { display: none; } }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; color: var(--text-2); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 120ms ease, color 120ms ease; }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-1); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .nav-badge { margin-left: auto; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.08); color: var(--text-3); font-weight: 500; }

    /* Lang buttons (header) */
    .lang-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--text-2); background: transparent; border: 0.5px solid transparent; cursor: pointer; transition: background 120ms, border-color 120ms; }
    .lang-btn:hover { background: rgba(255,255,255,0.05); }
    .lang-btn .lang-flag { font-size: 14px; line-height: 1; }
    .lang-btn-active { background: var(--accent-bg); color: var(--accent); border-color: rgba(111,224,168,0.30); }

    /* Stella preferiti sulle player card */
    .fav-star { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(14,17,22,0.55); backdrop-filter: blur(4px); border: 0.5px solid rgba(255,255,255,0.10); cursor: pointer; transition: transform 120ms ease, background 120ms ease; z-index: 5; color: var(--text-3); }
    .fav-star:hover { background: rgba(14,17,22,0.85); transform: scale(1.08); color: var(--hot); }
    .fav-star.is-fav { color: var(--hot); background: rgba(251,191,36,0.18); border-color: rgba(251,191,36,0.40); }
    .fav-star svg { width: 16px; height: 16px; }
    .fav-star.is-fav svg { fill: var(--hot); stroke: var(--hot); }
  </style>
</head>
<body class="min-h-screen">

<!-- Credit autore: pill centrata orizzontalmente nello spazio della sidebar -->
<div id="author-credit" style="position: fixed; top: 8px; left: 0; width: var(--sidebar-w); z-index: 50; text-align: center; pointer-events: none;">
  <span style="display: inline-block; font-size: 10px; line-height: 1.25; letter-spacing: 0.03em; font-weight: 600; padding: 3px 9px; background: rgba(14,17,22,0.85); border-radius: 6px; border: 0.5px solid var(--border); backdrop-filter: blur(4px); white-space: nowrap;">
    <span data-i18n="created_by" style="color: var(--text-3); font-weight: 500;">Created by</span> <span style="color: var(--accent);">Simone Contran</span>
  </span>
</div>

<!-- Auth gate: schermata di login bloccante con form inline, visibile fino a SIGNED_IN -->
<div id="auth-gate" style="display:none;position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at top, rgba(111,224,168,0.08), transparent 60%), var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:420px;width:100%;text-align:center;">
    <img src="../data/photos/branding/logo.png" alt="" style="width:160px;height:160px;margin:0 auto 24px;object-fit:contain;display:block;" onerror="this.style.display='none'"/>
    <h1 style="font-size:38px;font-weight:800;color:var(--text-1);margin:0 0 28px;letter-spacing:-0.02em;line-height:1.1;">Players Intelligence Database</h1>

    <input id="auth-gate-email" type="email" data-i18n-placeholder="gate_email_ph" placeholder="email@example.com" autocomplete="email"
           style="width:100%;padding:12px 14px;border-radius:10px;background:var(--surface-2,#21262E);border:0.5px solid var(--border,rgba(255,255,255,0.06));color:var(--text-1,#fff);font-size:14px;outline:none;box-sizing:border-box;margin-bottom:10px;"/>
    <input id="auth-gate-password" type="password" data-i18n-placeholder="gate_password_ph" placeholder="password" autocomplete="current-password"
           style="width:100%;padding:12px 14px;border-radius:10px;background:var(--surface-2,#21262E);border:0.5px solid var(--border,rgba(255,255,255,0.06));color:var(--text-1,#fff);font-size:14px;outline:none;box-sizing:border-box;"/>

    <div id="auth-gate-msg" style="font-size:12px;color:var(--text-3,#6B7585);min-height:18px;margin:10px 0 12px;line-height:1.4;"></div>

    <button id="auth-gate-submit" data-i18n="gate_signin" style="width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#0E1116;border:none;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(111,224,168,0.20);">
      Sign in
    </button>

    <div style="margin-top:18px;font-size:12px;color:var(--text-3,#6B7585);text-align:center;line-height:1.6;">
      <a href="#" id="auth-gate-link-signup" data-i18n="gate_create_account" style="color:var(--accent,#6FE0A8);text-decoration:none;">Create account</a>
      <span style="margin:0 6px;">·</span>
      <a href="#" id="auth-gate-link-magic" data-i18n="gate_magic_link" style="color:var(--info,#60A5FA);text-decoration:none;">Magic link</a>
      <span style="margin:0 6px;">·</span>
      <a href="#" id="auth-gate-link-reset" data-i18n="gate_forgot_password" style="color:var(--text-3,#6B7585);text-decoration:none;">Forgot password?</a>
    </div>
  </div>
</div>

<header class="sticky top-0 z-40" style="background: rgba(14,17,22,0.85); backdrop-filter: blur(8px); border-bottom: 0.5px solid var(--border);">
  <div class="px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between" style="margin-left: var(--sidebar-w);">
    <div class="flex items-center gap-3">
      <img src="../data/photos/branding/logo.png" alt="PID" class="w-14 h-14 object-contain" onerror="this.onerror=null;this.style.display='none'"/>
      <div>
        <h1 class="text-base font-semibold tracking-tight" data-i18n="title" style="color: var(--text-1);">Players Intelligence Database</h1>
        <p class="text-xs" data-i18n="subtitle" style="color: var(--text-3);"></p>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button id="lang-en" class="lang-btn" title="English"><span class="lang-flag">🇬🇧</span><span>EN</span></button>
      <button id="lang-it" class="lang-btn" title="Italiano"><span class="lang-flag">🇮🇹</span><span>IT</span></button>
    </div>
  </div>
</header>

<aside id="sidebar" class="fixed top-0 left-0 h-screen z-30 px-2 py-4 flex flex-col gap-1" style="width: var(--sidebar-w); background: rgba(14,17,22,0.95); backdrop-filter: blur(8px); border-right: 0.5px solid var(--border); padding-top: 76px;">
  <button id="sidebar-auth-btn" class="sidebar-label" style="margin: 0 6px 10px; padding: 8px 10px; background: rgba(96,165,250,0.10); color: var(--info); border: 0.5px solid rgba(96,165,250,0.20); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;">
    <span id="sidebar-auth-label" data-i18n="sidebar_signin">🔐 Sign in</span>
  </button>
  <div class="nav-item" data-route="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="sidebar-label" data-i18n="nav_home">Home</span>
  </div>
  <div class="nav-item" data-route="list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5"/><circle cx="3.5" cy="12" r="1.5"/><circle cx="3.5" cy="18" r="1.5"/></svg>
    <span class="sidebar-label" data-i18n="nav_list">Lista</span>
  </div>
  <div class="nav-item" data-route="favorites">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="sidebar-label" data-i18n="nav_favorites">Preferiti</span>
    <span id="favorites-badge" class="nav-badge" style="display:none;">0</span>
  </div>
  <div class="nav-item" data-route="clubs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L4 6 v6 c0 5 3 8 8 10 5-2 8-5 8-10 V6 z"/></svg>
    <span class="sidebar-label" data-i18n="nav_clubs">Club</span>
  </div>
  <div class="nav-item" data-route="compare">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="9" r="4"/><circle cx="17" cy="15" r="4"/><line x1="11" y1="11" x2="13" y2="13"/></svg>
    <span class="sidebar-label" data-i18n="nav_compare">Confronto</span>
  </div>
  <div class="nav-item" data-route="callup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span class="sidebar-label" data-i18n="nav_callup">Convocazione</span>
  </div>
  <div class="nav-item" data-route="grids">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="12" cy="12" r="3"/></svg>
    <span class="sidebar-label" data-i18n="nav_grids">Griglie</span>
  </div>
  <div class="nav-item" data-route="minutes">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="sidebar-label" data-i18n="nav_minutes">Minutaggi</span>
  </div>
  <div class="nav-item" data-route="scouting" id="nav-scouting">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6"/><path d="M8 11h6"/></svg>
    <span class="sidebar-label" data-i18n="nav_scouting">Scouting</span>
  </div>

  <!-- Separator: Salvataggi è una vista trasversale, non una funzionalità -->
  <div style="margin: 8px 8px; height: 0.5px; background: var(--border);"></div>

  <div class="nav-item" data-route="saves">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    <span class="sidebar-label" data-i18n="nav_saves">Salvataggi</span>
  </div>

  <!-- Admin: visibile SOLO per simonecontran10@gmail.com (toggle in JS) -->
  <div class="nav-item" data-route="admin" id="nav-admin" style="display: none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span class="sidebar-label">Admin</span>
  </div>

  <div class="mt-auto px-3 py-2" style="border-top: 0.5px solid var(--border);">
    <div class="text-[10px] uppercase tracking-wider" style="color: var(--text-3);" data-i18n="last_update">Aggiornamento</div>
    <div class="text-[11px] mt-0.5 stat-cell sidebar-label" id="sidebar-last-update" style="color: var(--text-2);">—</div>
  </div>
</aside>

<main class="px-4 sm:px-6 lg:px-8 py-6" style="margin-left: var(--sidebar-w);">

  <section id="stats-bar" class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-5">
    <div class="p-3 rounded-xl" style="background: var(--surface); border: 0.5px solid var(--border);">
      <div class="text-[10px] uppercase tracking-wider" style="color: var(--text-3);" data-i18n="players">Giocatori</div>
      <div class="text-xl font-bold mt-1 stat-cell" id="stat-players" style="color: var(--text-1);">—</div>
    </div>
    <div class="p-3 rounded-xl" style="background: var(--surface); border: 0.5px solid var(--border);">
      <div class="text-[10px] uppercase tracking-wider" style="color: var(--text-3);" data-i18n="clubs">Club</div>
      <div class="text-xl font-bold mt-1 stat-cell" id="stat-clubs" style="color: var(--text-1);">—</div>
    </div>
    <div class="p-3 rounded-xl" style="background: var(--surface); border: 0.5px solid var(--border);">
      <div class="text-[10px] uppercase tracking-wider" style="color: var(--text-3);" data-i18n="leagues">Leghe</div>
      <div class="text-xl font-bold mt-1 stat-cell" id="stat-leagues" style="color: var(--text-1);">—</div>
    </div>
  </section>

  <section class="mb-5 relative">
    <div class="rounded-xl p-1.5 flex items-center gap-2" style="background: var(--surface); border: 0.5px solid var(--border);">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 ml-2" style="color: var(--text-3);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Cerca giocatore o club..." data-i18n-placeholder="search_placeholder"
             class="flex-1 outline-none text-sm px-2 py-1.5 bg-transparent" autocomplete="off" style="color: var(--text-1);"/>
      <button id="search-clear" class="px-2 py-1 text-sm hidden" style="color: var(--text-3);">×</button>
    </div>
    <div id="search-results" class="absolute left-0 right-0 mt-1 rounded-xl shadow-2xl max-h-96 overflow-y-auto z-30 hidden" style="background: var(--surface); border: 0.5px solid var(--border-strong);"></div>
  </section>

  <section id="filters" class="flex flex-wrap items-center gap-2 mb-4">
    <select id="filter-league" class="filter-select">
      <option value="">Tutti i campionati</option>
      <option value="IT1" selected>Serie A</option>
      <option value="IT2">Serie B</option>
      <option value="IT3" data-i18n="league_it3">Seconde Squadre</option>
      <option value="IJ1" data-i18n="league_ij1">Primavera 1</option>
      <option value="PL1" data-i18n="league_pl1">Ekstraklasa</option>
      <option value="PL2" data-i18n="league_pl2">1 Liga</option>
    </select>
    <select id="filter-club" class="filter-select">
      <option value="" data-i18n="filter_all_clubs">Tutti i club</option>
    </select>
    <select id="filter-role" class="filter-select">
      <option value="" data-i18n="filter_all_roles">Tutti i ruoli</option>
      <option value="Goalkeeper" data-i18n="role_gk">Portiere</option>
      <option value="Defender" data-i18n="role_def">Difensore</option>
      <option value="Midfield" data-i18n="role_mid">Centrocampista</option>
      <option value="Attack" data-i18n="role_att">Attaccante</option>
    </select>
    <input id="filter-year-min" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4"
           placeholder="Anno min" class="filter-select w-24 stat-cell" style="font-size: 12px;"/>
    <input id="filter-year-max" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4"
           placeholder="Anno max" class="filter-select w-24 stat-cell" style="font-size: 12px;"/>
    <select id="filter-sort" class="filter-select">
      <option value="name" data-i18n="sort_name">Nome A-Z</option>
      <option value="age_asc" data-i18n="sort_age_asc">Più giovani</option>
      <option value="age_desc" data-i18n="sort_age_desc">Più anziani</option>
      <option value="club" data-i18n="sort_club">Club</option>
      <option value="goals_desc" data-i18n="sort_goals">Più gol 25/26</option>
    </select>
    <span id="count-info" class="ml-auto text-xs" style="color: var(--text-3);"></span>
  </section>

  <section id="tab-content">
    <div id="players-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-7 xl:grid-cols-8 gap-1.5"></div>
    <div id="list-panel" class="hidden"></div>
    <div id="favorites-panel" class="hidden"></div>
    <div id="clubs-content" class="hidden"></div>
    <div id="compare-panel" class="hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="compare-slot rounded-xl p-4 min-h-[260px] flex flex-col" data-slot="0" style="background: var(--surface); border: 0.5px solid var(--border);"></div>
        <div class="compare-slot rounded-xl p-4 min-h-[260px] flex flex-col" data-slot="1" style="background: var(--surface); border: 0.5px solid var(--border);"></div>
      </div>
      <div id="compare-stats" class="mt-4"></div>
    </div>
    <div id="callup-panel" class="hidden"></div>
    <div id="grids-panel" class="hidden"></div>
    <div id="saves-panel" class="hidden"></div>
    <div id="scouting-panel-main" class="hidden"></div>
    <div id="minutes-panel" class="hidden"></div>
  </section>


  <!-- Admin panel (visibile solo per admin) -->
  <div id="admin-panel" class="hidden"></div>

</main>

<div id="player-modal" class="fixed top-0 right-0 bottom-0 z-40 hidden flex items-start justify-center p-4 overflow-y-auto" style="left: var(--sidebar-w); background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);">
  <div class="rounded-2xl w-full max-w-[1240px] shadow-2xl my-2" id="player-modal-content" style="background: var(--surface); border: 0.5px solid var(--border-strong);"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="i18n.js?v=20260505a"></script>
<script src="cloud_sync.js?v=20260507a"></script>
<script src="app.js?v=20260505a"></script>
<script src="observations_ui.js?v=20260509p"></script>
</body>
</html>
