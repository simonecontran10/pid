name: Admin - Add Player from TM URL

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URL Transfermarkt giocatore/i (uno per riga, anche 1 solo)"
        required: true
        type: string
      sots_urls:
        description: "URL SortItOutSi giocatore/i corrispondenti (opzionale, uno per riga nello stesso ordine)"
        required: false
        type: string
        default: ""

concurrency:
  group: add-player
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  add-player:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install boto3 python-dotenv

      - name: Validate URLs
        run: |
          URLS="${{ github.event.inputs.urls }}"
          COUNT=0
          INVALID=0
          while IFS= read -r line; do
            line="$(echo "$line" | xargs)"
            [ -z "$line" ] && continue
            if echo "$line" | grep -qE 'transfermarkt\.[a-z.]+.*spieler/[0-9]+'; then
              COUNT=$((COUNT+1))
              echo "  OK: $line"
            else
              INVALID=$((INVALID+1))
              echo "  INVALID: $line"
            fi
          done <<< "$URLS"
          echo ""
          echo "Totale URL validi: $COUNT, invalidi: $INVALID"
          if [ "$COUNT" -eq 0 ]; then
            echo "Nessun URL valido. Abort."
            exit 1
          fi
          echo "$COUNT" > /tmp/url_count.txt

      - name: Run add_players.py (batch)
        env:
          SOTS_URLS: ${{ github.event.inputs.sots_urls }}
        run: |
          echo "${{ github.event.inputs.urls }}" | python3 add_players.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare"
            exit 0
          fi
          COUNT=$(cat /tmp/url_count.txt 2>/dev/null || echo "?")
          git commit -m "auto: add ${COUNT} player(s) from TM URL ($(date -u +%Y-%m-%d))"
          if git push; then
            echo "Push completato"
            exit 0
          fi
          echo "Push iniziale fallito, provo un rebase difensivo..."
          git rebase --abort 2>/dev/null || true
          git fetch origin main
          if git pull --rebase origin main && git push; then
            echo "Push riuscito al secondo tentativo"
            exit 0
          fi
          echo "Push fallito definitivamente"
          exit 1
