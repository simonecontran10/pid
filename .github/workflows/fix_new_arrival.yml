name: Fix - Re-scrape "New arrival" players

# Workflow una tantum per fixare i 269 giocatori in DB con
# current_club_name="New arrival" (bug pre-esistente nello scraper TM).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Numero massimo giocatori da processare (vuoto = tutti)"
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: fix-new-arrival
  cancel-in-progress: false

jobs:
  fix-new-arrival:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fix_new_arrival_clubs.py
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python3 fix_new_arrival_clubs.py --limit ${{ github.event.inputs.limit }}
          else
            python3 fix_new_arrival_clubs.py
          fi

      - name: Run enrich_sortitoutsi.py
        run: python3 enrich_sortitoutsi.py || true

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "fix: re-scrape giocatori 'New arrival' (correzione bug scraper)"
          for i in 1 2 3 4 5; do
            echo "Push attempt $i/5"
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            sleep 10
          done
          exit 1
